<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DodgeBlock</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #1a1a2e;
      color: #eee;
    }
    h1 {
      margin-bottom: 2rem;
      font-size: 2rem;
    }
    nav {
      display: flex;
      gap: 1.5rem;
    }
    a {
      padding: 0.75rem 1.5rem;
      background: #16213e;
      color: #eee;
      text-decoration: none;
      border-radius: 8px;
      transition: background 0.2s;
    }
    a:hover {
      background: #0f3460;
    }
  </style>
</head>
<body>
  <h1>DodgeBlock</h1>
  <nav>
    <a href="remake/">Remake</a>
    <a href="classic/">Classic</a>
  </nav>
</body>
</html>
